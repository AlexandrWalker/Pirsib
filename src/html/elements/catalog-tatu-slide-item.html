<div class="swiper-slide catalog__slide">
  <div class="catalog__item item-bg">
    <span class="border"></span>
    <a class="catalog__item-img" data-animation="parallax-img" data-fancybox="@@gallery" href="@@img">
      <span class="border"></span>
      <img src="@@img" alt="">
    </a>
    <div style="display: none;">
      <a href="@@img" data-fancybox="@@gallery"></a>
      <a href="@@img" data-fancybox="@@gallery"></a>
      <a href="@@img" data-fancybox="@@gallery"></a>
    </div>
    <a class="catalog__item-content" href="@@link">
      <div class="catalog__item-title h6">
        @@title
      </div>
      <div class="catalog__item-wrap">
        <p>
          @@time
        </p>
        <div class="h6">
          @@time-count
        </div>
      </div>
      <div class="catalog__item-wrap">
        <p>
          @@price
        </p>
        <div class="h6">
          @@price-count
        </div>
      </div>
    </a>
  </div>
</div>
