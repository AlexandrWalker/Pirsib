<div class="swiper-slide works__slide">
  <div class="works__item">
    <span class="border"></span>
    <div class="works__content">
      <div class="works__content-title h5">
        @@title
      </div>
      <div class="works__content-wrap">
        <p>
          @@time
        </p>
        <div class="h6">
          @@time-count
        </div>
      </div>
      <div class="works__content-wrap">
        <p>
          @@price
        </p>
        <div class="h6">
          @@price-count
        </div>
      </div>
    </div>
    <img src="@@img-before" alt="" loading="lazy">
    <a class="works__item-btn btn btn--big-icon" href="@@link">
      <span class="border"></span>
      О мастере
      <i class="icon-chevron-min">
        <span class="border"></span>
      </i>
    </a>
  </div>
</div>
