<div class="decorations__item sticky__item item-bg">
  <div class="border"></div>
  <a class="decorations__item-head" data-animation="parallax-img-scale" data-fancybox="@@gallery" href="@@img">
    <div class="border"></div>
    <img src="@@img" alt="">
  </a>
  <div style="display: none;">
    <a href="@@img" data-fancybox="@@gallery"></a>
    <a href="@@img" data-fancybox="@@gallery"></a>
    <a href="@@img" data-fancybox="@@gallery"></a>
  </div>
  <a class="decorations__item-body" href="@@link">
    <div class="decorations__item-content">
      <div class="decorations__item-title h6">
        @@title
      </div>
      <p>
        @@text
      </p>
    </div>
    <div class="decorations__item-btns">
      <div class="btn btn--inner">
        <span class="border"></span>
        Купить
        <div class="btn btn--inner-icon">
          <span class="border"></span>
          <i class="icon-telegram"></i>
        </div>
      </div>
    </div>

</div>
